name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        fi

    - name: Restore Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Restoring debug.keystore from base64..."
          base64 -d debug.keystore.base64 > debug.keystore || base64 --decode debug.keystore.base64 > debug.keystore
        fi
        if [ ! -f debug.keystore ]; then
          echo "Generating new debug.keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Build with Gradle
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug
        else
          gradle assembleDebug
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: school-share-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    - name: Create or Update GitHub Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.0
        name: "Okul Paylaşım v1.0.0 (Otomatik Yapılandırma)"
        body: |
          ### Okul Paylaşım Otomatik Yapılandırma Sürümü 🚀
          
          Bu sürüm, GitHub Actions CI/CD hattı tarafından otomatik olarak üretilmiştir.
          
          **Yenilikler:**
          • Otomatik güncelleme sistemi entegrasyonu.
          • GitHub Actions CI/CD otomatik sürümleme sistemi.
          • Performans ve kararlılık iyileştirmeleri.
        draft: false
        prerelease: false
        files: app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

